# SITE SETUP — wowchemy/Academic v5
# Keeps Julia's existing aesthetic: emerald color, Montserrat font

# Appearance
appearance:
  theme_day: custom
  theme_night: custom
  font: custom
  font_size: L

# Colors — emerald accent to match current site
colors:
  primary: '#008080'

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'Doctoral Candidate in Cognitive Psychology at Carnegie Mellon University'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    align: l
    show_logo: true
    show_search: true
    show_day_night: true
    highlight_active_link: true
    show_language: false

# Contact
email: juliajconti@gmail.com

# Social
social:
  - icon: envelope
    icon_pack: fas
    link: 'mailto:juliajconti@gmail.com'
  - icon: google-scholar
    icon_pack: ai
    link: https://scholar.google.com/citations?user=1N84zYkAAAAJ&hl=en&inst=3203679203499159833
  - icon: github
    icon_pack: fab
    link: https://github.com/juliajconti
  - icon: linkedin
    icon_pack: fab
    link: https://www.linkedin.com/in/juliajconti/
  - icon: instagram
    icon_pack: fab
    link: https://www.instagram.com/juliajconti

# Site footer
footer:
  copyright:
    notice: '© {year} Julia J. Conti. Licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false
  repository:
    url: 'https://github.com/juliajconti/juliajconti.github.io'
    branch: main
    content_dir: ''

# Comments
comments:
  provider: ''

# Search
search:
  provider: wowchemy
